<div class="card">
  <div class="card-body">
    <div class="table-responsive">
      <table id="ownerTable" class="table table-striped table-bordered" style="width: 100%">
        <thead class="thead-dark">
          <tr>
            <th>ID</th>
            <th>OWNER NAME</th>
            <th>OWNER TYPE</th>
            <th>ID NUMBER</th>
            <th>PHONE</th>
            <th>EMAIL</th>
            <th>PROPERTY</th>
            <th>ADDRESS</th>
            <th>ZONE</th>
            <th>PROPERTY TYPE</th>
            <th>VALUE (GHS)</th>
            <th>PAYMENT RATE</th>
            <th>ACTIONS</th>
          </tr>
        </thead>
        <tbody>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Edit Owner Modal -->
<div class="modal fade" id="editOwnerModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Edit Owner Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="editOwnerForm" method="POST">
          {% csrf_token %}
          <input type="hidden" name="owner_id" id="editOwnerId">
          <div id="editFormContent">
            <!-- Form content will be dynamically loaded here -->
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- View Property Owners Modal -->
<div class="modal fade" id="viewPropertyOwnersModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Property Owners</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="propertyOwnersContent">
          <!-- Property owners content will be loaded here -->
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Success/Error Messages -->
<div id="messageContainer" class="mt-3"></div>
</div>
<!-- //import jquery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>


<script>
$(document).ready(function () {
  // Initialize DataTable
  var table = $("#ownerTable").DataTable({
    paging: true,
    searching: false, // Disable built-in search since we use custom search
    ordering: true,
    info: true,
    responsive: true,
    autoWidth: false,
    processing: true,
    serverSide: false,
    lengthMenu: [10, 25, 50, 100, 250],
    pageLength: 25,
    ajax: {
      url: "/api/owners/",
      type: "GET",
      dataType: "json",
      dataSrc: function (json) {
        if (json.success && json.data) {
          return json.data;
        }
        showMessage("danger", json.error || "Error fetching owners");
        return [];
      },
      error: function (xhr) {
        showMessage("danger", `Error fetching owners: ${xhr.responseText}`);
        return [];
      }
    },
    dom: "Bfrtip",
    buttons: [
      {
        extend: "copy",
        text: '<i class="fas fa-copy"></i> Copy',
        className: "btn btn-sm btn-outline-secondary",
      },
      {
        extend: "csv",
        text: '<i class="fas fa-file-csv"></i> CSV',
        className: "btn btn-sm btn-outline-success",
      },
      {
        extend: "excel",
        text: '<i class="fas fa-file-excel"></i> Excel',
        className: "btn btn-sm btn-outline-primary",
      },
      {
        extend: "pdf",
        text: '<i class="fas fa-file-pdf"></i> PDF',
        className: "btn btn-sm btn-outline-danger",
      },
      {
        text: '<i class="fas fa-print"></i> Print',
        className: "btn btn-sm btn-outline-info",
        action: function(e, dt, node, config) {
          window.print();
        }
      }
    ],
    order: [[1, "asc"]], // Sort by owner name
    columns: [
      { data: 'id', visible: false },
      { 
        data: 'owner_name',
        className: "text-left",
        render: function(data, type, row) {
          return `
          <div class="d-flex align-items-center">
            <div class="symbol symbol-40px me-3">
              <span class="symbol-label bg-light-primary">
                <i class="fas fa-user text-primary"></i>
              </span>
            </div>
            <div>
              <div class="fw-bold">${escapeHtml(data)}</div>
              ${row.owner_address ? `<small class="text-muted">${escapeHtml(row.owner_address.substring(0, 50))}</small>` : ''}
            </div>
          </div>`;
        }
      },
      { 
        data: 'owner_type', 
        className: "text-center",
        render: function(data) {
          const typeClass = data === 'individual' ? 'info' : 'primary';
          const icon = data === 'individual' ? 'user' : 'building';
          return `<span class="badge bg-${typeClass}"><i class="fas fa-${icon}"></i> ${data.toUpperCase()}</span>`;
        }
      },
      { 
        data: 'id_number', 
        className: "text-left",
        render: function(data) {
          return data ? escapeHtml(data) : '<span class="text-muted">—</span>';
        }
      },
      { 
        data: 'phone_number', 
        className: "text-left",
        render: function(data) {
          if (!data) return '<span class="text-muted">—</span>';
          return `<a href="tel:${data}">${escapeHtml(data)}</a>`;
        }
      },
      { 
        data: 'email', 
        className: "text-left",
        render: function(data) {
          if (!data) return '<span class="text-muted">—</span>';
          return `<a href="mailto:${data}">${escapeHtml(data)}</a>`;
        }
      },
      { 
        data: 'property_display',
        className: "text-left",
        render: function(data, type, row) {
          if (!data) return '<span class="text-muted">No property</span>';
          return `
            <div>
              <div class="fw-bold">${escapeHtml(data)}</div>
              <button class="btn btn-sm btn-outline-info mt-1 view-property-owners" data-property-id="${row.property_id}" title="View All Owners">
                <i class="fas fa-users"></i> View Owners
              </button>
            </div>`;
        }
      },
      { 
        data: 'property_address', 
        className: "text-left",
        render: function(data) {
          return data ? escapeHtml(data.substring(0, 60)) : '<span class="text-muted">—</span>';
        }
      },
      { 
        data: 'property_zone', 
        className: "text-left",
        render: function(data) {
          return data ? `<span class="badge bg-secondary">${escapeHtml(data)}</span>` : '<span class="text-muted">—</span>';
        }
      },
      { 
        data: 'property_type', 
        className: "text-left",
        render: function(data) {
          return data ? `<span class="badge bg-dark">${escapeHtml(data)}</span>` : '<span class="text-muted">—</span>';
        }
      },
      { 
        data: 'rateable_value', 
        className: "text-end",
        render: function(data) {
          if (!data) return '<span class="text-muted">—</span>';
          return `<span class="fw-bold">GHS ${data.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>`;
        }
      },
      { 
        data: 'payment_rate', 
        className: "text-center",
        render: function(data) {
          const rate = parseFloat(data);
          let color = 'danger';
          let icon = 'times-circle';
          
          if (rate >= 75) {
            color = 'success';
            icon = 'check-circle';
          } else if (rate >= 25) {
            color = 'warning';
            icon = 'exclamation-triangle';
          }
          
          if (rate === 0) {
            return `<span class="badge bg-secondary"><i class="fas fa-ban"></i> No Payments</span>`;
          }
          
          return `<span class="badge bg-${color}"><i class="fas fa-${icon}"></i> ${rate.toFixed(1)}%</span>`;
        }
      },
      {
        data: "id",
        render: function (data, type, row) {
          return `
            <div class="d-flex justify-content-center gap-1">
              <button class="btn btn-sm btn-primary edit-owner" data-id="${data}" title="Edit Owner">
                <i class="fas fa-edit"></i>
              </button>
              <button class="btn btn-sm btn-info view-owner" data-id="${data}" title="View Details">
                <i class="fas fa-eye"></i>
              </button>
            </div>`;
        },
      },
    ],
    drawCallback: function() {
      // Re-initialize tooltips if any
      $('[data-bs-toggle="tooltip"]').tooltip();
    }
  });

  // Load statistics
  loadStatistics();

  // Refresh statistics
  $('#refreshStats').click(function() {
    loadStatistics();
  });

  // Export owners
  $('#exportBtn').click(function() {
    window.location.href = '/api/owners/export/';
  });

  // Filter by owner type
  $('#ownerTypeFilter').change(function() {
    applyFilters();
  });

  // Filter by payment status
  $('#paymentStatusFilter').change(function() {
    applyFilters();
  });

  // Search functionality
  $('#searchButton').click(function() {
    performSearch();
  });

  $('#searchInput').keypress(function(e) {
    if (e.which === 13) {
      performSearch();
    }
  });

  $('#clearSearchBtn').click(function() {
    $('#searchInput').val('');
    $('#ownerTypeFilter').val('');
    $('#paymentStatusFilter').val('');
    table.ajax.reload();
    loadStatistics();
  });

  function applyFilters() {
    const ownerType = $('#ownerTypeFilter').val();
    const paymentStatus = $('#paymentStatusFilter').val();
    const searchQuery = $('#searchInput').val();
    
    // Reload table with filters
    table.ajax.url(`/api/owners/?owner_type=${ownerType}&payment_status=${paymentStatus}&search=${encodeURIComponent(searchQuery)}`).load();
  }

  function performSearch() {
    const query = $('#searchInput').val().trim();
    if (query) {
      $.ajax({
        url: '/api/owners/search/',
        type: 'GET',
        data: { q: query },
        success: function(response) {
          if (response.success) {
            if (response.data.length > 0) {
              // Clear current table and add search results
              table.clear();
              response.data.forEach(function(owner) {
                table.row.add(owner);
              });
              table.draw();
              showMessage('success', `Found ${response.count} matching owners`);
            } else {
              showMessage('info', 'No owners found matching your search');
              table.clear().draw();
            }
          } else {
            showMessage('danger', response.error);
          }
        },
        error: function(xhr) {
          showMessage('danger', 'Search failed');
        }
      });
    } else {
      // If search is empty, reload original data
      table.ajax.reload();
    }
  }

  // Show Message Function
  function showMessage(type, message) {
    $("#messageContainer").html(`
      <div class="alert alert-${type} alert-dismissible fade show" role="alert">
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    `);
    setTimeout(() => {
      $(".alert").fadeOut("slow");
    }, 4000);
  }

  // Escape HTML to prevent XSS
  function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // CSRF Token Function
  function getCSRFToken() {
    let cookieValue = null;
    let cookies = document.cookie.split(";");
    for (let cookie of cookies) {
      cookie = cookie.trim();
      if (cookie.startsWith("csrftoken=")) {
        cookieValue = cookie.substring("csrftoken=".length);
        break;
      }
    }
    return cookieValue;
  }

  // Apply CSRF Token to AJAX Requests
  $.ajaxSetup({
    beforeSend: function (xhr, settings) {
      if (!this.crossDomain && settings.type !== "GET") {
        xhr.setRequestHeader("X-CSRFToken", getCSRFToken());
      }
    },
  });

  // Load Statistics
  function loadStatistics() {
    $.ajax({
      url: '/api/owners/stats/',
      type: 'GET',
      success: function(response) {
        if (response.success) {
          const stats = response.data;
          renderStatistics(stats);
        } else {
          $('#statsContainer').html(`
            <div class="col-12">
              <div class="alert alert-danger">Failed to load statistics: ${response.error}</div>
            </div>
          `);
        }
      },
      error: function(xhr) {
        $('#statsContainer').html(`
          <div class="col-12">
            <div class="alert alert-danger">Failed to load statistics</div>
          </div>
        `);
      }
    });
  }

  // Render Statistics
  function renderStatistics(stats) {
    let statsHTML = `
      <div class="col-xl-3 col-md-6">
        <div class="card card-animate">
          <div class="card-body">
            <div class="d-flex align-items-center">
              <div class="flex-grow-1">
                <p class="text-uppercase fw-medium text-muted mb-0">Total Owners</p>
                <h4 class="fs-22 fw-semibold ff-secondary mb-0">${stats.total_owners}</h4>
              </div>
              <div class="flex-shrink-0">
                <div class="avatar-sm flex-shrink-0">
                  <span class="avatar-title bg-primary rounded-circle fs-3">
                    <i class="fas fa-users"></i>
                  </span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <div class="col-xl-3 col-md-6">
        <div class="card card-animate">
          <div class="card-body">
            <div class="d-flex align-items-center">
              <div class="flex-grow-1">
                <p class="text-uppercase fw-medium text-muted mb-0">Individual Owners</p>
                <h4 class="fs-22 fw-semibold ff-secondary mb-0">${stats.individual_owners}</h4>
              </div>
              <div class="flex-shrink-0">
                <div class="avatar-sm flex-shrink-0">
                  <span class="avatar-title bg-info rounded-circle fs-3">
                    <i class="fas fa-user"></i>
                  </span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <div class="col-xl-3 col-md-6">
        <div class="card card-animate">
          <div class="card-body">
            <div class="d-flex align-items-center">
              <div class="flex-grow-1">
                <p class="text-uppercase fw-medium text-muted mb-0">Company Owners</p>
                <h4 class="fs-22 fw-semibold ff-secondary mb-0">${stats.company_owners}</h4>
              </div>
              <div class="flex-shrink-0">
                <div class="avatar-sm flex-shrink-0">
                  <span class="avatar-title bg-success rounded-circle fs-3">
                    <i class="fas fa-building"></i>
                  </span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <div class="col-xl-3 col-md-6">
        <div class="card card-animate">
          <div class="card-body">
            <div class="d-flex align-items-center">
              <div class="flex-grow-1">
                <p class="text-uppercase fw-medium text-muted mb-0">Collection Rate</p>
                <h4 class="fs-22 fw-semibold ff-secondary mb-0">${stats.collection_rate}%</h4>
              </div>
              <div class="flex-shrink-0">
                <div class="avatar-sm flex-shrink-0">
                  <span class="avatar-title bg-warning rounded-circle fs-3">
                    <i class="fas fa-chart-line"></i>
                  </span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    `;
    
    $('#statsContainer').html(statsHTML);
  }

  // Edit Owner
  $(document).on("click", ".edit-owner", function() {
    const ownerId = $(this).data("id");

    // Show loading state
    $("#editFormContent").html(`
      <div class="text-center py-4">
        <i class="fas fa-spinner fa-spin fa-2x"></i>
        <p>Loading owner details...</p>
      </div>
    `);
    $("#editOwnerModal").modal("show");

    $.ajax({
      url: `/api/owners/${ownerId}/`,
      type: "GET",
      success: function(response) {
        if (response.success) {
          const data = response.data;
          
          const formHTML = `
            <input type="hidden" name="owner_id" value="${data.id}">
            
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">Property</label>
                <input type="text" class="form-control" value="${escapeHtml(data.property_display)}" readonly/>
                <small class="text-muted">Property linked to this owner</small>
              </div>
              <div class="col-md-6">
                <label class="form-label">Owner Type*</label>
                <select name="owner_type" class="form-select" required>
                  <option value="individual" ${data.owner_type === 'individual' ? 'selected' : ''}>Individual</option>
                  <option value="company" ${data.owner_type === 'company' ? 'selected' : ''}>Company</option>
                </select>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-12">
                <label class="form-label">Owner Name*</label>
                <input type="text" name="owner_name" class="form-control" value="${escapeHtml(data.owner_name)}" required/>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">ID/TIN Number</label>
                <input type="text" name="id_number" class="form-control" value="${escapeHtml(data.id_number)}"/>
              </div>
              <div class="col-md-6">
                <label class="form-label">Phone Number</label>
                <input type="text" name="phone_number" class="form-control" value="${escapeHtml(data.phone_number)}"/>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-12">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" value="${escapeHtml(data.email)}"/>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-12">
                <label class="form-label">Owner Address</label>
                <textarea name="owner_address" class="form-control" rows="3">${escapeHtml(data.owner_address)}</textarea>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">Property Type</label>
                <input type="text" name="prop_type" class="form-control" value="${escapeHtml(data.prop_type)}"/>
              </div>
              <div class="col-md-6">
                <label class="form-label">Zone/Area</label>
                <input type="text" name="area_zone" class="form-control" value="${escapeHtml(data.area_zone)}"/>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">Suburb/District</label>
                <input type="text" name="suburb" class="form-control" value="${escapeHtml(data.suburb)}"/>
              </div>
              <div class="col-md-6">
                <label class="form-label">Street Name</label>
                <input type="text" name="street_name" class="form-control" value="${escapeHtml(data.street_name)}"/>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">House No.</label>
                <input type="text" name="house_no" class="form-control" value="${escapeHtml(data.house_no)}"/>
              </div>
              <div class="col-md-6">
                <label class="form-label">Property Name</label>
                <input type="text" name="prop_name" class="form-control" value="${escapeHtml(data.prop_name)}"/>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-12">
                <label class="form-label">Rateable Value (GHS)</label>
                <input type="number" step="0.01" name="rateable_value" class="form-control" value="${data.rateable_value}"/>
              </div>
            </div>
            
            <div class="text-end mt-4">
              <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Update Owner
              </button>
            </div>
          `;
          
          $("#editFormContent").html(formHTML);
        } else {
          Swal.fire({
            icon: 'error',
            title: 'Error',
            text: response.error || 'Failed to fetch owner details'
          });
          $("#editOwnerModal").modal("hide");
        }
      },
      error: function(xhr) {
        Swal.fire({
          icon: 'error',
          title: 'Error',
          text: xhr.responseJSON?.error || 'Failed to load owner details'
        });
        $("#editOwnerModal").modal("hide");
      }
    });
  });

  // View Owner Details
  $(document).on("click", ".view-owner", function() {
    const ownerId = $(this).data("id");
    
    $.ajax({
      url: `/api/owners/${ownerId}/`,
      type: "GET",
      success: function(response) {
        if (response.success) {
          const data = response.data;
          
          Swal.fire({
            title: '<i class="fas fa-user-circle"></i> Owner Details',
            html: `
              <div class="text-start">
                <div class="mb-3">
                  <strong>Owner Name:</strong><br>
                  ${escapeHtml(data.owner_name)}
                </div>
                <div class="mb-3">
                  <strong>Owner Type:</strong><br>
                  <span class="badge bg-${data.owner_type === 'individual' ? 'info' : 'primary'}">${data.owner_type.toUpperCase()}</span>
                </div>
                <div class="mb-3">
                  <strong>ID/TIN Number:</strong><br>
                  ${data.id_number || '<span class="text-muted">Not provided</span>'}
                </div>
                <div class="mb-3">
                  <strong>Contact:</strong><br>
                  ${data.phone_number ? `<i class="fas fa-phone"></i> ${data.phone_number}<br>` : ''}
                  ${data.email ? `<i class="fas fa-envelope"></i> ${data.email}` : ''}
                  ${!data.phone_number && !data.email ? '<span class="text-muted">No contact info</span>' : ''}
                </div>
                <div class="mb-3">
                  <strong>Address:</strong><br>
                  ${data.owner_address || '<span class="text-muted">No address</span>'}
                </div>
                <div class="mb-3">
                  <strong>Property:</strong><br>
                  ${data.property_display || 'No property linked'}
                </div>
                <div class="mb-3">
                  <strong>Property Details:</strong><br>
                  Type: ${data.prop_type || 'N/A'}<br>
                  Zone: ${data.area_zone || 'N/A'}<br>
                  Suburb: ${data.suburb || 'N/A'}<br>
                  Street: ${data.street_name || 'N/A'}<br>
                  House: ${data.house_no || 'N/A'}
                </div>
                <div class="mb-3">
                  <strong>Financial:</strong><br>
                  Rateable Value: ${data.rateable_value ? `GHS ${data.rateable_value.toLocaleString()}` : 'N/A'}<br>
                  Ownership: ${data.ownership_percentage}%<br>
                  ${data.is_primary_owner ? '<span class="badge bg-success"><i class="fas fa-crown"></i> Primary Owner</span>' : ''}
                </div>
              </div>
            `,
            icon: 'info',
            confirmButtonText: 'Close',
            width: '600px'
          });
        } else {
          showMessage('danger', response.error || 'Failed to load owner details');
        }
      },
      error: function(xhr) {
        showMessage('danger', 'Failed to load owner details');
      }
    });
  });

  // Handle form submission for updating owner
  $("#editOwnerForm").on("submit", function(e) {
    e.preventDefault();
    
    const form = $(this);
    const submitBtn = form.find('button[type="submit"]');
    submitBtn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i> Updating...');
    
    const ownerId = form.find('input[name="owner_id"]').val();
    const formData = new FormData(this);
    
    Swal.fire({
      title: 'Confirm Update',
      text: 'Are you sure you want to update this owner?',
      icon: 'question',
      showCancelButton: true,
      confirmButtonText: 'Yes, update it!',
      cancelButtonText: 'Cancel'
    }).then((result) => {
      if (result.isConfirmed) {
        $.ajax({
          url: `/api/owners/${ownerId}/update/`,
          type: "POST",
          data: formData,
          processData: false,
          contentType: false,
          success: function(response) {
            if (response.success) {
              Swal.fire({
                icon: 'success',
                title: 'Success',
                text: response.message,
                timer: 1500,
                showConfirmButton: false
              }).then(() => {
                $("#editOwnerModal").modal("hide");
                table.ajax.reload();
                loadStatistics(); // Refresh stats
              });
            } else {
              Swal.fire({
                icon: 'error',
                title: 'Error',
                text: response.error || 'Failed to update owner'
              });
            }
          },
          error: function(xhr) {
            let errorMsg = 'Failed to update owner';
            if (xhr.responseJSON && xhr.responseJSON.error) {
              errorMsg = xhr.responseJSON.error;
            }
            Swal.fire({
              icon: 'error',
              title: 'Error',
              text: errorMsg
            });
          },
          complete: function() {
            submitBtn.prop('disabled', false).html('<i class="fas fa-save"></i> Update Owner');
          }
        });
      } else {
        submitBtn.prop('disabled', false).html('<i class="fas fa-save"></i> Update Owner');
      }
    });
  });

  // View Property Owners
  $(document).on("click", ".view-property-owners", function() {
    const propertyId = $(this).data('property-id');
    
    // Show loading state
    $("#propertyOwnersContent").html(`
      <div class="text-center py-4">
        <i class="fas fa-spinner fa-spin fa-2x"></i>
        <p>Loading property owners...</p>
      </div>
    `);
    $("#viewPropertyOwnersModal").modal("show");

    $.ajax({
      url: `/api/properties/${propertyId}/owners/`,
      type: "GET",
      success: function(response) {
        if (response.success) {
          const owners = response.data;
          
          let ownersHTML = `
            <h6 class="mb-3">${response.property_display}</h6>
            <div class="table-responsive">
              <table class="table table-sm table-hover">
                <thead>
                  <tr>
                    <th>Owner Name</th>
                    <th>Type</th>
                    <th>ID Number</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Ownership %</th>
                    <th>Rateable Value</th>
                  </tr>
                </thead>
                <tbody>
          `;
          
          if (owners.length > 0) {
            owners.forEach(owner => {
              ownersHTML += `
                <tr>
                  <td>
                    ${escapeHtml(owner.owner_name)}
                    ${owner.is_primary_owner ? '<span class="badge bg-success ms-1"><i class="fas fa-crown"></i></span>' : ''}
                  </td>
                  <td><span class="badge bg-${owner.owner_type === 'individual' ? 'info' : 'primary'}">${owner.owner_type}</span></td>
                  <td>${owner.id_number || '-'}</td>
                  <td>${owner.phone_number ? `<a href="tel:${owner.phone_number}">${owner.phone_number}</a>` : '-'}</td>
                  <td>${owner.email ? `<a href="mailto:${owner.email}">${owner.email}</a>` : '-'}</td>
                  <td><span class="badge bg-primary">${owner.ownership_percentage}%</span></td>
                  <td class="text-end">GHS ${owner.rateable_value.toLocaleString()}</td>
                </tr>
              `;
            });
          } else {
            ownersHTML += `
              <tr>
                <td colspan="7" class="text-center text-muted">No owners found for this property</td>
              </tr>
            `;
          }
          
          ownersHTML += `
                </tbody>
              </table>
            </div>
            <div class="mt-3">
              <small class="text-muted">Total Owners: ${owners.length}</small>
            </div>
          `;
          
          $("#propertyOwnersContent").html(ownersHTML);
        } else {
          $("#propertyOwnersContent").html(`
            <div class="alert alert-danger">${response.error}</div>
          `);
        }
      },
      error: function(xhr) {
        $("#propertyOwnersContent").html(`
          <div class="alert alert-danger">Failed to load property owners</div>
        `);
      }
    });
  });
});
</script>
