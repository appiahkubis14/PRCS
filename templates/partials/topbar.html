<!-- Add custom CSS for the topbar menu -->
<style>
/* Topbar menu styles */
.navbar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
}

.menu-dropdown-btn, .menu-link-btn {
    margin: 0 2px;
    /* border-color: #e9ecef; */
    color: #495057;
    font-weight: 500;
    padding: 0.5rem 1rem;
}

.menu-dropdown-btn:hover, .menu-link-btn:hover {
    background-color: #6e8603;
    /* border-color: #dee2e6; */
}

/* Dropdown submenu styles */
.dropdown-submenu {
    position: relative;
}

.dropdown-submenu .dropdown-menu {
    top: 0;
    left: 100%;
    margin-top: -6px;
    margin-left: -1px;
    border-radius: 0.25rem;
}

.dropdown-submenu:hover .dropdown-menu {
    display: block;
}

.dropdown-submenu .dropdown-toggle::after {
    display: inline-block;
    margin-left: 0.5em;
    vertical-align: middle;
    content: "";
    border-top: 0.3em solid transparent;
    border-right: 0;
    border-bottom: 0.3em solid transparent;
    border-left: 0.3em solid;
}

.dropdown-menu {
    max-height: calc(100vh - 60px);
    overflow-y: auto;
}

/* Ensure proper spacing for icons */
.dropdown-item i {
    width: 1.2rem;
    text-align: center;
}

/* Responsive adjustments */
@media (max-width: 1200px) {
    .menu-dropdown-btn, .menu-link-btn {
        padding: 0.4rem 0.8rem;
        font-size: 0.875rem;
    }
}

@media (max-width: 992px) {
    .d-lg-block {
        display: none !important;
    }
    
    /* Add a mobile menu button for smaller screens */
    .mobile-menu-btn {
        display: block;
    }
}

/* Mobile menu button (visible only on mobile) */
.mobile-menu-btn {
    display: none;
    margin-right: 1rem;
}

@media (max-width: 991.98px) {
    .mobile-menu-btn {
        display: block;
    }
}
</style>

<!-- Add JavaScript for enhanced dropdown functionality -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Handle dropdown submenus on hover (desktop)
    if (window.innerWidth > 992) {
        const submenuItems = document.querySelectorAll('.dropdown-submenu');
        
        submenuItems.forEach(item => {
            item.addEventListener('mouseenter', function() {
                const submenu = this.querySelector('.dropdown-submenu-menu');
                if (submenu) {
                    submenu.classList.add('show');
                }
            });
            
            item.addEventListener('mouseleave', function() {
                const submenu = this.querySelector('.dropdown-submenu-menu');
                if (submenu) {
                    submenu.classList.remove('show');
                }
            });
        });
    }
    
    // Handle dropdown toggles on click (mobile)
    const dropdownToggles = document.querySelectorAll('.dropdown-toggle');
    
    dropdownToggles.forEach(toggle => {
        toggle.addEventListener('click', function(e) {
            if (window.innerWidth <= 992) {
                e.preventDefault();
                const dropdownMenu = this.nextElementSibling;
                if (dropdownMenu) {
                    dropdownMenu.classList.toggle('show');
                }
            }
        });
    });
    
    // Set active state based on current URL
    function setActiveMenu() {
        const currentPath = window.location.pathname;
        const menuLinks = document.querySelectorAll('.dropdown-item[href], .menu-link-btn[href]');
        
        menuLinks.forEach(link => {
            const href = link.getAttribute('href');
            if (href && href !== '#' && href !== 'javascript: void(0);' && href === currentPath) {
                link.classList.add('active');
                
                // Find parent dropdown button and add active class
                const parentDropdown = link.closest('.dropdown-menu');
                if (parentDropdown) {
                    const dropdownBtn = parentDropdown.previousElementSibling;
                    if (dropdownBtn && dropdownBtn.classList.contains('menu-dropdown-btn')) {
                        dropdownBtn.classList.add('active');
                    }
                }
            }
        });
    }
    
    setActiveMenu();
    
    // Close dropdowns when clicking outside
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.dropdown')) {
            document.querySelectorAll('.dropdown-menu.show').forEach(menu => {
                menu.classList.remove('show');
            });
        }
    });
});
</script>
