    <!-- Custom Theme: Yellow and Green (La Nkwantanang - Madina Municipal Assembly) -->
    <style>
        :root {
            /* Primary Green Theme */
            --bs-primary: #0dae48 !important;
            --bs-primary-rgb: 13, 174, 72 !important;
            --primary: #0dae48;
            --primary-dark: #0a8d3a;
            --primary-light: #4dd97a;
            
            /* Secondary Yellow Theme */
            --bs-secondary: #ffff07 !important;
            --bs-secondary-rgb: 255, 255, 7 !important;
            --secondary: #ffff07;
            --secondary-dark: #cccc05;
            --secondary-light: #ffffe0;
            
            /* Accent Colors */
            --success: #0dae48;
            --accent: #0dae48;
            --accent-light: #4dd97a;
        }

        /* Override Bootstrap Primary Colors */
        .btn-primary,
        .bg-primary,
        /* .text-primary, */
        .border-primary {
            background-color: #0dae48 !important;
            border-color: #0dae48 !important;
            color: #ffffff !important;
        }

        .btn-primary:hover,
        .btn-primary:focus,
        .btn-primary:active {
            background-color: #0a8d3a !important;
            border-color: #0a8d3a !important;
        }

        .btn-outline-primary {
            color: #0dae48 !important;
            border-color: #0dae48 !important;
        }

        .btn-outline-primary:hover {
            background-color: #0dae48 !important;
            border-color: #0dae48 !important;
            color: #ffffff !important;
        }

        /* Override Secondary Colors */
        .btn-secondary,
        .bg-secondary {
            background-color: #ffff07 !important;
            border-color: #ffff07 !important;
            color: #000000 !important;
        }

        .btn-secondary:hover,
        .btn-secondary:focus,
        .btn-secondary:active {
            background-color: #cccc05 !important;
            border-color: #cccc05 !important;
        }

        /* Link Colors */
        a.text-primary,
        a:not(.btn).text-primary {
            color: #0dae48 !important;
        }

        a.text-primary:hover {
            color: #0a8d3a !important;
        }

        /* Card Primary */
        .card-primary {
            background-color: #0dae48 !important;
            border-color: #0dae48 !important;
        }

        /* Badge Primary */
        .badge-primary,
        .badge.bg-primary {
            background-color: #0dae48 !important;
        }

        /* Progress Bar */
        .progress-bar {
            background-color: #0dae48 !important;
        }

        /* Alert Primary */
        .alert-primary {
            background-color: rgba(13, 174, 72, 0.1) !important;
            border-color: #0dae48 !important;
            color: #0dae48 !important;
        }

        /* Sidebar Active States */
        .sidebar-menu .menu-item.active > a,
        .sidebar-menu .menu-item.active > .menu-link {
            background-color: rgba(13, 174, 72, 0.1) !important;
            color: #0dae48 !important;
        }

        /* Topbar */
        .topbar {
            background-color: #0dae48 !important;
        }

        /* Custom Setting Button */
        .custom-setting.bg-secondary {
            background-color: #ffff07 !important;
        }

        /* DataTables Primary Buttons */
        .dt-buttons .btn-primary {
            background-color: #0dae48 !important;
            border-color: #0dae48 !important;
        }

        /* Select2 Primary Theme */
        .select2-container--default .select2-results__option--highlighted[aria-selected] {
            background-color: #0dae48 !important;
        }

        .select2-container--default .select2-selection--multiple .select2-selection__choice {
            background-color: #0dae48 !important;
            border-color: #0dae48 !important;
        }

        /* Pagination Active */
        .page-item.active .page-link {
            background-color: #0dae48 !important;
            border-color: #0dae48 !important;
        }

        .page-link {
            color: #0dae48 !important;
        }

        .page-link:hover {
            color: #0a8d3a !important;
        }

        /* Nav Tabs Active */
        .nav-tabs .nav-link.active {
            color: #0dae48 !important;
            border-color: #0dae48 #0dae48 #fff !important;
        }

        .nav-tabs .nav-link:hover {
            border-color: rgba(13, 174, 72, 0.1) !important;
        }

        /* Dropdown Primary */
        .dropdown-item.active,
        .dropdown-item:active {
            background-color: #0dae48 !important;
        }

        /* Form Controls Focus */
        .form-control:focus,
        .form-select:focus {
            border-color: #0dae48 !important;
            box-shadow: 0 0 0 0.25rem rgba(13, 174, 72, 0.25) !important;
        }

        /* Checkbox and Radio Primary */
        .form-check-input:checked {
            background-color: #0dae48 !important;
            border-color: #0dae48 !important;
        }

        /* Switch Primary */
        .form-switch .form-check-input:checked {
            background-color: #0dae48 !important;
        }

        /* Range Slider Primary */
        .form-range::-webkit-slider-thumb {
            background-color: #0dae48 !important;
        }

        .form-range::-moz-range-thumb {
            background-color: #0dae48 !important;
        }

        /* Sidebar Menu Styling */
        #sidebar-menu ul li.mm-active > a,
        #sidebar-menu ul li.mm-active > a i {
            color: #0dae48 !important;
            background-color: rgba(13, 174, 72, 0.1) !important;
        }

        #sidebar-menu ul li a:hover {
            color: #0dae48 !important;
            background-color: rgba(13, 174, 72, 0.05) !important;
        }

        #sidebar-menu ul li a:hover i {
            color: #0dae48 !important;
        }

        /* Topbar/Navbar Styling */
        #page-topbar {
            background-color: #0dae48 !important;
            border-bottom: 2px solid #0a8d3a !important;
        }

        .navbar-logo-box {
            background-color: #0dae48 !important;
            border-right: 1px solid rgba(255, 255, 255, 0.1) !important;
        }

        .top-icon {
            color: #ffffff !important;
        }

        .top-icon:hover {
            background-color: rgba(255, 255, 255, 0.1) !important;
            color: #ffff07 !important;
        }

        /* Sidebar Left Styling */
        .sidebar-left {
            border-right: 1px solid rgba(13, 174, 72, 0.1) !important;
        }

        .menu-title {
            color: #0dae48 !important;
            font-weight: 600 !important;
        }

        /* Breadcrumb */
        .breadcrumb-item.active {
            color: #0dae48 !important;
        }

        .breadcrumb-item a {
            color: #0dae48 !important;
        }

        .breadcrumb-item a:hover {
            color: #0a8d3a !important;
        }

        /* Tooltip */
        .tooltip-inner {
            background-color: #0dae48 !important;
        }

        .tooltip.bs-tooltip-top .tooltip-arrow::before {
            border-top-color: #0dae48 !important;
        }

        .tooltip.bs-tooltip-bottom .tooltip-arrow::before {
            border-bottom-color: #0dae48 !important;
        }

        .tooltip.bs-tooltip-start .tooltip-arrow::before {
            border-left-color: #0dae48 !important;
        }

        .tooltip.bs-tooltip-end .tooltip-arrow::before {
            border-right-color: #0dae48 !important;
        }

        /* Modal */
        .modal-header {
            border-bottom: 1px solid rgba(13, 174, 72, 0.1) !important;
        }

        .modal-footer {
            border-top: 1px solid rgba(13, 174, 72, 0.1) !important;
        }

        /* Table Styling */
        .table-primary,
        .table-primary > th,
        .table-primary > td {
            background-color: rgba(13, 174, 72, 0.1) !important;
            color: #0dae48 !important;
        }

        .table-hover tbody tr:hover {
            background-color: rgba(13, 174, 72, 0.05) !important;
        }

        /* List Group */
        .list-group-item.active {
            background-color: #0dae48 !important;
            border-color: #0dae48 !important;
        }

        /* Spinner */
        .spinner-border-primary {
            border-color: #0dae48 !important;
        }

        .spinner-grow-primary {
            background-color: #0dae48 !important;
        }

        /* Toast */
        .toast-header {
            background-color: rgba(13, 174, 72, 0.1) !important;
            border-bottom: 1px solid rgba(13, 174, 72, 0.2) !important;
            color: #0dae48 !important;
        }

        /* Accordion */
        .accordion-button:not(.collapsed) {
            background-color: rgba(13, 174, 72, 0.1) !important;
            color: #0dae48 !important;
        }

        .accordion-button:not(.collapsed)::after {
            filter: brightness(0) saturate(100%) invert(20%) sepia(95%) saturate(2000%) hue-rotate(80deg) brightness(0.3);
        }

        /* Carousel */
        .carousel-control-prev-icon,
        .carousel-control-next-icon {
            background-color: #0dae48 !important;
        }

        .carousel-indicators [data-bs-target].active {
            background-color: #0dae48 !important;
        }

        /* Offcanvas */
        .offcanvas-header {
            border-bottom: 1px solid rgba(13, 174, 72, 0.1) !important;
        }

        /* Custom Scrollbar */
        .simplebar-scrollbar::before {
            background-color: rgba(13, 174, 72, 0.5) !important;
        }

        /* Footer */
        .footer {
            border-top: 1px solid rgba(13, 174, 72, 0.1) !important;
        }

        /* Chart Colors (for Chart.js and ApexCharts) */
        .chart-primary {
            color: #0dae48 !important;
        }

        /* SweetAlert2 Customization */
        .swal2-confirm {
            background-color: #0dae48 !important;
        }

        .swal2-confirm:hover {
            background-color: #0a8d3a !important;
        }

        .swal2-cancel {
            background-color: #ffff07 !important;
            color: #000000 !important;
        }

        .swal2-cancel:hover {
            background-color: #cccc05 !important;
        }

        /* Flatpickr Calendar */
        .flatpickr-day.selected,
        .flatpickr-day.startRange,
        .flatpickr-day.endRange {
            background-color: #0dae48 !important;
            border-color: #0dae48 !important;
        }

        .flatpickr-day.selected:hover,
        .flatpickr-day.startRange:hover,
        .flatpickr-day.endRange:hover {
            background-color: #0a8d3a !important;
            border-color: #0a8d3a !important;
        }

        /* DataTables Styling */
        .dataTables_wrapper .dataTables_paginate .paginate_button.current,
        .dataTables_wrapper .dataTables_paginate .paginate_button.current:hover {
            background-color: #0dae48 !important;
            border-color: #0dae48 !important;
            color: #ffffff !important;
        }

        .dataTables_wrapper .dataTables_paginate .paginate_button:hover {
            background-color: rgba(13, 174, 72, 0.1) !important;
            border-color: #0dae48 !important;
            color: #0dae48 !important;
        }

        .dataTables_wrapper .dataTables_filter input:focus {
            border-color: #0dae48 !important;
            box-shadow: 0 0 0 0.25rem rgba(13, 174, 72, 0.25) !important;
        }

        .dataTables_wrapper .dataTables_length select:focus {
            border-color: #0dae48 !important;
            box-shadow: 0 0 0 0.25rem rgba(13, 174, 72, 0.25) !important;
        }

        /* Loading Spinner */
        .spinner-border,
        .spinner-grow {
            color: #0dae48 !important;
        }

        /* Custom Setting Button Text Color */
        .custom-setting .btn {
            color: #000000 !important;
        }

        /* Notification Badge */
        .badge-notification {
            background-color: #ffff07 !important;
            color: #000000 !important;
        }

        /* Success Button with Green */
        .btn-success {
            background-color: #0dae48 !important;
            border-color: #0dae48 !important;
        }

        .btn-success:hover {
            background-color: #1a6b1a !important;
            border-color: #1a6b1a !important;
        }

        /* Info Button with Light Green */
        .btn-info {
            background-color: #4dd97a !important;
            border-color: #4dd97a !important;
            color: #000000 !important;
        }

        .btn-info:hover {
            background-color: #7acc7a !important;
            border-color: #7acc7a !important;
        }
    </style>

          crossorigin="" />
</head>
